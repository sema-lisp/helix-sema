name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate languages.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check languages.toml is well-formed TOML
        run: python3 -c "import tomllib; tomllib.load(open('languages.toml','rb')); print('languages.toml is valid TOML')"
