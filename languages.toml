# Sema language configuration for Helix
# Uses the tree-sitter-sema grammar for Sema-specific syntax support.

[[language]]
name = "sema"
scope = "source.sema"
injection-regex = "sema"
file-types = ["sema"]
comment-tokens = ";"
roots = ["sema.toml"]
grammar = "sema"
indent = { tab-width = 2, unit = "  " }
auto-format = false
language-servers = ["sema-lsp"]

[language-server.sema-lsp]
command = "sema"
args = ["lsp"]

[language.auto-pairs]
"(" = ")"
"[" = "]"
"{" = "}"
"\"" = "\""

# Debug adapter — Sema's DAP server (`sema dap`) over stdio.
# Start a session with `:debug-start` / space-g-d; pick the "launch" template
# and Helix will prompt for the program (defaults to the current file).
[language.debugger]
name = "sema"
transport = "stdio"
command = "sema"
args = ["dap"]

[[language.debugger.templates]]
name = "launch"
request = "launch"
completion = [{ name = "program", completion = "filename" }]
args = { program = "{0}" }

[[language.debugger.templates]]
name = "launch (stop on entry)"
request = "launch"
completion = [{ name = "program", completion = "filename" }]
args = { program = "{0}", stopOnEntry = true }

[[grammar]]
name = "sema"
source = { git = "https://github.com/sema-lisp/tree-sitter-sema", rev = "v0.2.0" }
